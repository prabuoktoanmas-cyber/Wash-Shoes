<!DOCTYPE html>
<html>
<head>
<title>Transaksi</title>

<style>
body {
    margin:0;
    font-family:'Segoe UI';
    display:flex;
    background:#0f172a;
    color:white;
}

/* sidebar */
.sidebar {
    width:230px;
    background:#020617;
    padding:20px;
}
.sidebar a {
    display:block;
    padding:12px;
    color:#94a3b8;
    text-decoration:none;
}
.sidebar a:hover {
    background:#1e293b;
    color:white;
}

/* main */
.main {flex:1;}

.topbar {
    background:#020617;
    padding:15px;
}

.content {
    padding:20px;
}

/* input */
input, select, button {
    padding:10px;
    margin:5px;
    border:none;
    border-radius:10px;
}
button {
    background:#00f2fe;
    cursor:pointer;
}

/* table */
table {
    width:100%;
    border-collapse:collapse;
    background:rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
}
th, td {
    padding:12px;
}
th {
    background:#1e293b;
}

/* status glow */
.proses {
    color:orange;
    text-shadow:0 0 10px orange;
}
.selesai {
    color:lime;
    text-shadow:0 0 10px lime;
}
</style>

</head>

<body>

<div class="sidebar">
<h2>👟 Wash Shoes</h2>
<a href="dashboard.html">Dashboard</a>
<a href="pelanggan.html">Pelanggan</a>
<a href="transaksi.html">Transaksi</a>
</div>

<div class="main">

<div class="topbar">💸 Transaksi</div>

<div class="content">

<input id="nama" placeholder="Nama">
<input id="layanan" placeholder="Layanan">
<select id="status">
<option>Proses</option>
<option>Selesai</option>
</select>
<button onclick="tambah()">Tambah</button>

<table id="tabel"></table>

</div>

</div>

<script>
let data = JSON.parse(localStorage.getItem("transaksi")) || [];

function tampil(){
let table=document.getElementById("tabel");
table.innerHTML="<tr><th>Nama</th><th>Layanan</th><th>Status</th><th>Aksi</th></tr>";

data.forEach((d,i)=>{
let row=table.insertRow();
row.insertCell(0).innerHTML=d.nama;
row.insertCell(1).innerHTML=d.layanan;
row.insertCell(2).innerHTML=
d.status=="Proses"
? `<span class="proses">${d.status}</span>`
: `<span class="selesai">${d.status}</span>`;
row.insertCell(3).innerHTML=`<button onclick="hapus(${i})">Hapus</button>`;
});
}

function tambah(){
let nama=document.getElementById("nama").value;
let layanan=document.getElementById("layanan").value;
let status=document.getElementById("status").value;

data.push({nama,layanan,status});
localStorage.setItem("transaksi", JSON.stringify(data));
tampil();
}

function hapus(i){
data.splice(i,1);
localStorage.setItem("transaksi", JSON.stringify(data));
tampil();
}

tampil();
</script>

</body>
</html>
