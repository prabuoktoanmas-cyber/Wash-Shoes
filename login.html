<!DOCTYPE html>
<html>
<head>
<title>Wash Shoes</title>
<style>
body {
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:'Segoe UI';
    background: linear-gradient(135deg,#1e3c72,#2a5298);
}

.box {
    backdrop-filter: blur(20px);
    background: rgba(255,255,255,0.1);
    padding:40px;
    border-radius:20px;
    color:white;
    text-align:center;
    width:300px;
    box-shadow:0 0 40px rgba(0,0,0,0.5);
    animation: fade 1s ease;
}

@keyframes fade {
    from {opacity:0; transform:translateY(20px);}
    to {opacity:1;}
}

input {
    width:100%;
    padding:10px;
    margin:10px 0;
    border:none;
    border-radius:10px;
}

button {
    width:100%;
    padding:10px;
    border:none;
    border-radius:10px;
    background:#00f2fe;
    color:black;
    cursor:pointer;
}

button:hover {
    background:#4facfe;
}
</style>
</head>

<body>

<div class="box">
<h1>👟 Wash Shoes</h1>
<p>Premium System</p>
<input placeholder="Username">
<input type="password" placeholder="Password">
<button onclick="window.location='dashboard.html'">Login</button>
</div>

</body>
</html>
