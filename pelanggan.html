<!DOCTYPE html>
<html>
<head>
<title>Pelanggan</title>

<style>
body {
    margin:0;
    font-family:'Segoe UI';
    display:flex;
    background:#0f172a;
    color:white;
}

/* sidebar */
.sidebar {
    width:230px;
    background:#020617;
    padding:20px;
}
.sidebar a {
    display:block;
    padding:12px;
    color:#94a3b8;
    text-decoration:none;
}
.sidebar a:hover {
    background:#1e293b;
    color:white;
}

/* main */
.main {flex:1;}

.topbar {
    background:#020617;
    padding:15px;
}

/* content */
.content {
    padding:20px;
}

/* input */
input, button {
    padding:10px;
    margin:5px;
    border:none;
    border-radius:10px;
}
button {
    background:#00f2fe;
    cursor:pointer;
}

/* table glass */
table {
    width:100%;
    border-collapse:collapse;
    backdrop-filter: blur(10px);
    background: rgba(255,255,255,0.05);
    border-radius:10px;
    overflow:hidden;
}
th, td {
    padding:12px;
}
th {
    background:#1e293b;
}
tr:hover {
    background:rgba(255,255,255,0.1);
}
</style>

</head>

<body>

<div class="sidebar">
<h2>👟 Wash Shoes</h2>
<a href="dashboard.html">Dashboard</a>
<a href="pelanggan.html">Pelanggan</a>
<a href="transaksi.html">Transaksi</a>
</div>

<div class="main">

<div class="topbar">👤 Data Pelanggan</div>

<div class="content">

<input id="nama" placeholder="Nama">
<input id="hp" placeholder="No HP">
<button onclick="tambah()">Tambah</button>

<table id="tabel"></table>

</div>

</div>

<script>
let data = JSON.parse(localStorage.getItem("pelanggan")) || [];

function tampil(){
let table = document.getElementById("tabel");
table.innerHTML="<tr><th>Nama</th><th>No HP</th><th>Aksi</th></tr>";

data.forEach((d,i)=>{
let row = table.insertRow();
row.insertCell(0).innerHTML=d.nama;
row.insertCell(1).innerHTML=d.hp;
row.insertCell(2).innerHTML=`<button onclick="hapus(${i})">Hapus</button>`;
});
}

function tambah(){
let nama=document.getElementById("nama").value;
let hp=document.getElementById("hp").value;

if(nama==""||hp==""){
alert("Isi dulu!");
return;
}

data.push({nama,hp});
localStorage.setItem("pelanggan", JSON.stringify(data));
tampil();
}

function hapus(i){
data.splice(i,1);
localStorage.setItem("pelanggan", JSON.stringify(data));
tampil();
}

tampil();
</script>

</body>
</html>
